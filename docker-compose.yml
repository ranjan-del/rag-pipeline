# docker-compose.yml — app + optional vector database (Qdrant)
#
# `docker compose up` builds and serves the FastAPI app on http://localhost:8000.
# The app runs fully offline (in-memory store + offline LLM fallback), so the
# qdrant service is OPTIONAL — the default code path does not connect to it. It
# is kept here as the reference "heavier backend" for the store/vector_store.py
# QdrantVectorStore sketch.
#
# NOTE: This was NOT run in the dev environment (no Docker available there); it
# is written to be correct.

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rag-pipeline-app
    ports:
      - "8000:8000"
    env_file:
      # Optional — the app runs with no .env at all.
      - path: .env
        required: false
    volumes:
      - ./app:/code/app
      - ./data:/code/data
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-pipeline-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
